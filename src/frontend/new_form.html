<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escapadas: Mi Diario de Experiencias</title>
    <link rel="stylesheet" href="css/new_form.css" />
  </head>
  <body>
    <header>
      <h1>🌍 Escapadas</h1>
      <p>Registra tus viajes, rutas y anécdotas inolvidables</p>
      <nav>
        <li>
          <a href="index.html">Inicio</a>
          <a href="index.html">Añadir</a>
          <a href="yo.html">Conóceme</a>
        </li>
      </nav>
    </header>

    <main class="container">
      <!-- Formulario de Entrada -->
      <section class="form-section">
        <h2>Añadir Nueva Experiencia</h2>
        <form id="viaje-form" method="POST" enctype="multipart/form-data">
          <div class="form-group">
            <label for="titulo">Título del viaje:</label>
            <input
              type="text"
              id="titulo"
              placeholder="Ej: Fin de semana en Tarifa"
              required
            />
          </div>
          <div class="form-group">
            <label for="pais">País / Continente:</label>
            <input type="text" id="pais" placeholder="Ej: España" />
          </div>
          <div class="form-group">
            <label for="categoria">Entorno / Categoría:</label>
            <select id="categoria">
              <option value="Playa/Mar">Playa / Mar</option>
              <option value="Montaña">Montaña</option>
              <option value="Pueblo">Pueblo</option>
              <option value="Ciudad">Ciudad</option>
            </select>
          </div>
          <div class="form-group">
            <label for="estado">Estado del viaje:</label>
            <select id="estado">
              <option value="Pendiente">Pendiente</option>
              <option value="Visitado">Visitado</option>
            </select>
          </div>
          <div class="form-group">
            <label for="descripcion">Anécdotas y comentarios:</label>
            <textarea
              id="descripcion"
              rows="3"
              placeholder="¿Qué sucedió en este viaje?"
            ></textarea>
          </div>
          <div class="form-group">
            <label for="fecha">Fecha del viaje:</label>
            <input type="date" id="fecha" />
          </div>
          <div class="form-group">
            <label for="calificacion">Calificación personal:</label>
            <select id="calificacion">
              <option value="">Sin calificar</option>
              <option value="1">⭐</option>
              <option value="2">⭐⭐</option>
              <option value="3">⭐⭐⭐</option>
              <option value="4">⭐⭐⭐⭐</option>
              <option value="5">⭐⭐⭐⭐⭐</option>
            </select>
          </div>
          <!-- Este es el botón que abre el explorador de archivos -->
            <input
              type="file"
              id="imagenFile"
              accept="image/*"
              style="display: block" 
              class="btn-action"
            />
            
            
            <!-- Contenedor visual de la imagen -->
            <!-- <img
              src=""
              alt="imagen a subir"
              id="imagenFile"
              class="imagen"
              style="cursor: pointer; max-width: 100%; height: auto"
            /> -->
            <!-- Vista previa para Archivo Local -->
            <div
            id="contenedor-vista-previa-archivo"
            style="margin-top: 10px; display: none"
          >
            <p style="font-size: 12px; color: #6c757d; margin-bottom: 5px">
              Vista previa del archivo:
            </p>
            <img
              id="vista-previa-img-archivo"
              src=""
              alt="Vista previa archivo"
              class="vista-previa"
              style="max-width: 100%; height: auto; border-radius: 6px;"
            />
            <label class="contenedor-check" id="eliminarImagen">
            <input type="checkbox" id="chekeliminarImagen" class="checkEliminar">
            <span class="checkbox-personalizado"></span>
            Eliminar imagen actual
            </label>
          </div>
          </div>
          
          
          <div class="form-group">
            <a
              href="https://pixabay.com/es/"
              target="_blank"
              style="font-size: 12px; color: #007bff; text-decoration: none"
            >
              🌐 Repositorio de imágenes en Pixabay
            </a>
          </div>
          
          <div class="form-group">
            <label for="imagenUrl">URL de la imagen:</label>
            <input
              type="url"
              id="imagenUrl"
              placeholder="Ej: https://pixabay.com/foto123.jpg"
            />
          </div>
          <!-- Vista previa para URL Remota -->
          <div
            id="contenedor-vista-previa-url"
            style="margin-top: 10px; display: none"
          >
            <p style="font-size: 12px; color: #6c757d; margin-bottom: 5px">
              Vista previa de la URL:
            </p>
            <img
              id="vista-previa-img-url"
              src=""
              alt="Vista previa URL"
              class="vista-previa"
              style="max-width: 100%; height: auto; border-radius: 6px;"
            />
          </div>
          
          <!-- <button type="submit" class="btn">Guardar Experiencia</button> -->
          <div style="display: flex; gap: 10px; margin-top: 15px">
            <!-- Tu botón de guardar existente -->
            <button type="submit" class="btn-action" style="flex: 2">
              ➕ Guardar Experiencia
            </button>

            <!-- NUEVO: Botón para cancelar edición (oculto por defecto) -->
            <button
              type="button"
              id="btn-cancelar"
              class="btn-action btn-secondary"
              style="
                display: none;
                flex: 1;
                background-color: #dc3545;
                color: white;
              "
              onclick="cancelarEdicion()"
            >
              ❌ Cancelar
            </button>
          </div>
        </form>
      </section>

      
    <script src="js/app.js"></script>
    <!-- <script src="js/bundle.js"></script> -->
    
  </body>
</html>
